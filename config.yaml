# -------------------------------------------------------------
# 7. 필터링
# -------------------------------------------------------------
filters:
  # 스포츠 — 금융 기사에도 쓰이는 말은 제외했다.
  #  ('경기'=경기도·경기전망, '시즌'=시즌 프로모션, '리그'=리그오브레전드,
  #   '전반기/후반기'=반기 실적, '우승'=공모전 우승 등에 쓰임)
  sports_exclude: [축구, 야구, 농구, 배구, 골프, 월드컵, K리그, 프로야구, KBO,
                   올림픽, 구단, 홈런, 탈삼진, 타자, 투수, 안타, 실책, 선발등판,
                   시청률, 빅매치, 개막전, 데뷔전, 국가대표, 아시안게임,
                   프로배구, 프로농구, e스포츠, 감독 선임, 선수단, 치어리더]
  crime_exclude: [살인, 폭행, 성폭행, 마약, 강도, 절도, 구속, 입건, 피의자, 범행, 횡령, 배임]
  # 아래 키워드 포함 시 범죄 필터에 걸려도 보류 → 디지털 관련성 재판단
  # 보안 이슈 — 디지털 맥락이 분명한 것만.
  # ('금융사기 예방', '인증 강화'는 오프라인 교육·캠페인 기사에도 흔해 제외)
  security_override: [보이스피싱, 이상거래탐지, FDS, 이상금융거래, 해킹, 스미싱,
                      딥페이크, 개인정보 유출, 정보보호]
  promo_exclude_hint: [경품, 추첨, 이벤트 당첨, 할인 프로모션]   # 단순 홍보성 판단 보조 (제외 아닌 감점)

# -------------------------------------------------------------
# 8. 분류
# -------------------------------------------------------------
classification:
  ai_keywords: [AI, 인공지능, 생성형AI, "생성형 AI", LLM, 대규모언어모델, "대규모 언어 모델", 에이전틱, "AI 에이전트", 머신러닝, 딥러닝]
  sectors: [은행, 증권, 카드, 캐피탈, 보험, 저축은행, 기타]

# -------------------------------------------------------------
# 9. 중복 제거
# -------------------------------------------------------------
dedup:
  batch_internal: [url_hash, norm_title_hash, body_hash, title_similarity, body_fingerprint]
  title_similarity_threshold: 0.62     # 정규화 제목 자카드/시퀀스 유사도
  body_fingerprint: simhash            # 해밍거리 3 이하 중복 판정
  delivered_exclude: [url_hash_exact, norm_title_hash_exact]   # 과거분은 완전 일치만

title_normalize:
  remove_brackets: ["[단독]", "[속보]", "[인사]", "[게시판]", "[포토]", "[그래픽]", "[영상]", "[르포]", "[종합]"]
  strip_quotes: true
  collapse_spaces: true
  lowercase_ascii: true
  remove_press_prefix: true

# -------------------------------------------------------------
# 10. 요약 (기사 1건 = LLM 1회, 배치 금지)
# -------------------------------------------------------------
summarizer:
  provider: groq                # groq | anthropic | openai
  model: llama-3.3-70b-versatile      # 주 모델
  fallback_model: llama-3.1-8b-instant  # 70b 일일한도 소진 시 자동 전환 (쿼터 별개)
  body_chars: 1100               # 요약에 보낼 본문 길이 (문장 단위로 절단)
  min_body_chars: 200            # 이보다 짧으면 Groq 호출 생략 (환각 방지 + 토큰 절약)
  max_tokens: 320                # 4줄 × 70자 여유분 (상한일 뿐, 실제 생성량만 소비)
  batch: false                  # 절대 변경 금지
  max_retries: 3
  backoff_base_seconds: 2
  style: "-함/-임/-할 계획 임원 보고용 간결체"
  lines: 3
  line_prefix: "*"
  rules:
    - 각 줄은 한 문장
    - 주체·서비스·변화·영향 또는 계획 포함
    - 본문에 없는 내용 추정 금지
    - 약어는 처음 등장 시 괄호로 풀어씀
  validation:
    min_lines: 2                 # 개조식 2~3줄
    max_lines: 4          # 내용 많은 기사는 4줄까지
    each_starts_with: "-"
    min_line_chars: 25   # 단어 나열식 짧은 줄 거부

# -------------------------------------------------------------
# 11. HTML 아카이브
# -------------------------------------------------------------
github:
  owner: yeo6119-commits          # GitHub 사용자명
  repo: financial-news            # 저장소명
  workflow: run.yml               # 워크플로 파일명
  branch: main

html:
  output_file: output/financial_news_archive.html
  view: archive                 # DB 60일치 전체를 매 실행 재생성
  menu_order: [all, hana, shinhan, kb, woori, nh, regional, policy, securities, cardins, internet, overseas]
  group_articles_by: run_datetime      # 회차(요청 일시)별 타임라인
  ledger: compact               # 수지 검증은 한 줄 요약바
  show_failed_articles: inline  # 요약/추출 실패도 해당 카테고리에 카드로 수록
  excluded_section: collapsible

# -------------------------------------------------------------
# 12. DB
# -------------------------------------------------------------
db:
  path: news.db
  retention_days: 60              # 반영 기사 보관 (제외 기사는 저장하지 않음)
  store_full_body: false
  delivered_after_html_success: true   # HTML rename 성공 후 트랜잭션으로만 처리
