# =============================================================
# 금융회사 디지털·AI 뉴스 수집 시스템 — config.yaml (v2.2)
# 원칙: 수집은 넓게, 제외·분류·요약은 본문 확보 후 로컬 판단
# =============================================================

# -------------------------------------------------------------
# 1. 검색 시간 조건
# -------------------------------------------------------------
time:
  window_hours: 24               # 요청 시각 기준 최근 24시간 고정

# -------------------------------------------------------------
# 2. 네이버 API
# -------------------------------------------------------------
naver_api:
  display: 100
  max_start: 1000
  sort: date
  stop_rule: full_page_old       # 페이지 전체가 기간 이전일 때만 중단
  extra_page_after_old: 1        # 기간 외 기사 첫 발견 후 1페이지 추가 확인
  daily_call_limit: 25000

# -------------------------------------------------------------
# 3. 검색용 서비스 키워드
# -------------------------------------------------------------
search_service_keywords:         # Tier 1 회사명 조합용 (8개)
  - 앱
  - 디지털
  - AI
  - 인공지능
  - 생성형AI
  - 플랫폼
  - 비대면
  - MTS

search_service_keywords_lite:    # Tier 2 회사명 조합용 (4개)
  - 앱
  - 디지털
  - AI
  - 플랫폼

group_service_keywords:          # 지주·그룹명 조합용
  - AI
  - 인공지능
  - 디지털
  - 플랫폼
  - 데이터
  - 생성형AI

# 본문 관련성 판단용 (검색어 아님 — 로컬 매칭 전용)
local_relevance_keywords:
  - 리뉴얼
  - 개편
  - 고도화
  - 출시
  - 도입
  - 확대
  - 개선
  - 탑재
  - 적용
  - 오픈
  - 챗봇
  - 마이데이터
  - 간편결제
  - 간편인증
  - 슈퍼앱
  - 개인화
  - 자산관리
  - UX
  - UI

# -------------------------------------------------------------
# 4. Tier 1 — 5대 지주 + 인터넷은행·핀테크 (최대 커버리지)
#    검색: 브랜드 단독 + 회사명×search_service_keywords + 그룹명×group_service_keywords
